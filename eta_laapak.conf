server {
    listen 80;
    server_name eta.laapak.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name eta.laapak.com;

    ssl_certificate /etc/letsencrypt/live/eta.laapak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eta.laapak.com/privkey.pem;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_eta http://invoicing-api:3000;
        proxy_pass $upstream_eta;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
